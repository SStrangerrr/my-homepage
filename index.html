<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的小站</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background-color: #f7f7f7;
      color: #222;
    }

    nav {
      background-color: #222;
      padding: 16px 40px;
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .hero {
      background-color: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 16px;
    }

    p {
      line-height: 1.8;
      font-size: 18px;
    }

    .section {
      margin-top: 32px;
      background-color: white;
      padding: 28px;
      border-radius: 16px;
    }

    .section h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <nav>
    <a href="#home">首页</a>
    <a href="#notes">文章</a>
    <a href="#projects">作品</a>
    <a href="#lab">AI实验室</a>
    <a href="#about">关于</a>
  </nav>

  <main class="container">
    <section class="hero" id="home">
      <h1>欢迎来到我的小站</h1>
      <p>
        这是一个用于记录学习、项目和创意实验的个人网站。
        之后这里会放一些公开的学习笔记、项目记录和有趣的网页小功能。
      </p>
    </section>

    <section class="section" id="notes">
      <h2>文章</h2>
      <p>这里以后可以放课程笔记、学习记录和一些想法整理。</p>
    </section>

    <section class="section" id="projects">
      <h2>作品</h2>
      <p>这里以后可以放公开项目、课程设计展示和网页作品。</p>
    </section>

    <section class="section" id="lab">
      <h2>AI实验室</h2>
      <p>这里以后可以放一些AI生成内容、小工具和创意互动网页。</p>
    </section>

    <section class="section" id="about">
      <h2>关于</h2>
      <p>这里可以写非常简短的介绍，但不要放真实姓名、学号、手机号、私人邮箱等隐私信息。</p>
    </section>
  </main>
</body>
</html>
