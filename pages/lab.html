<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="主导航">
      <a class="brand" href="../index.html">奇怪的一角</a>
      <div class="nav-links">
        <a href="../index.html">首页</a>
        <a href="projects.html">正在生长</a>
        <a href="notes.html">写下来的</a>
        <a href="lab.html" aria-current="page">实验室</a>
        <a href="about.html">关于我</a>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <div class="container narrow-container">
        <h1>实验室</h1>
        <p class="lead-text">这里放一些创意小网页，可能有点奇怪，也可能有点有用。</p>
      </div>
    </section>

    <section class="section-block compact-section">
      <div class="container">
        <article class="creative-card theme-side-quest">
          <div>
            <p class="announcement-meta">新入口</p>
            <h2>人生支线任务</h2>
            <p>主线太累的时候，可以去抽一条小小的支线。它像一个日常小游戏，负责把普通日子轻轻拨动一下。</p>
          </div>
          <a class="creative-card-action" href="https://life-side-quest.netlify.app/" target="_blank" rel="noopener noreferrer">打开支线任务</a>
        </article>
      </div>
    </section>

    <section class="section-block">
      <div class="container split-section lab-layout">
        <div class="section-heading align-left">
          <h2>随机灵感卡片</h2>
          <p>不知道写什么的时候，就随手换一句。它不一定有用，但可能刚好接住一点想法。</p>
        </div>
        <div class="inspiration-box large-box">
          <p class="inspiration-text" data-inspiration-output>先做一个能运行的小东西，再慢慢把它变得顺眼。</p>
          <button class="button button-primary" type="button" data-inspiration-button>换一句</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 奇怪的一角</p>
      <p>用 HTML、CSS 和 JavaScript 慢慢搭起来。</p>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
